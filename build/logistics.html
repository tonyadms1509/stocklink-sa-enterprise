<!DOCTYPE html>
<html>
<head>
  <title>Logistics Dashboard | StockLink Ferrari</title>
  <style>
    body { font-family: Roboto, sans-serif; background:#fff; color:#333; margin:20px; }
    h1 { color:#FF9800; }
    .banner { background:#FF9800; color:#fff; padding:10px; border-radius:5px; margin-bottom:20px; }
    .btn { padding:10px 20px; margin:5px; border:none; border-radius:5px; color:#fff; cursor:pointer; }
    .blue { background:#0057B7; }
    .orange { background:#FF9800; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { border:1px solid #ccc; padding:10px; text-align:left; }
  </style>
</head>
<body>
  <div class="banner">🔒 Trial Active — 7 Days Remaining</div>
  <h1>🚚 Logistics Dashboard</h1>
  <p>Logistics partners can manage deliveries, assign drivers, and track payouts here.</p>

  <h2>Delivery Schedule</h2>
  <table>
    <tr><th>Route</th><th>Status</th></tr>
    <tr><td>Route A</td><td><span style="color:#FF9800;">In Transit</span></td></tr>
    <tr><td>Route B</td><td><span style="color:#28A745;">Delivered</span></td></tr>
  </table>

  <button class="btn blue">Assign Driver</button>
  <button class="btn orange">Track Vehicle</button>

  <h2>Status Updates</h2>
  <p>Pending: <span style="color:#E10600;">3</span></p>
  <p>In Transit: <span style="color:#FF9800;">2</span></p>
  <p>Delivered: <span style="color:#28A745;">5</span></p>

  <h2>Payouts</h2>
  <p>Last Payment: R1200</p>
</body>
</html>
