<!DOCTYPE html>
<html>
<head>
  <title>Supplier Dashboard | StockLink Ferrari</title>
  <style>
    body { font-family: Roboto, sans-serif; background: #fff; color: #333; margin: 20px; }
    h1 { color: #E10600; }
    .banner { background:#28A745; color:#fff; padding:10px; border-radius:5px; margin-bottom:20px; }
    .btn { padding:10px 20px; margin:5px; border:none; border-radius:5px; color:#fff; cursor:pointer; }
    .green { background:#28A745; }
    .blue { background:#0057B7; }
    .red { background:#E10600; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { border:1px solid #ccc; padding:10px; text-align:left; }
  </style>
</head>
<body>
  <div class="banner">🔒 Trial Active — 7 Days Remaining</div>
  <h1>🏭 Supplier Dashboard</h1>
  <p>Suppliers can showcase products, connect with contractors, and manage logistics partnerships here.</p>

  <h2>Products</h2>
  <button class="btn green">Add Product</button>
  <button class="btn blue">Manage Inventory</button>
  <button class="btn red">View Payouts</button>

  <table>
    <tr><th>Product</th><th>Quantity</th><th>Price</th></tr>
    <tr><td>Item A</td><td>100</td><td>R250</td></tr>
    <tr><td>Item B</td><td>50</td><td>R120</td></tr>
  </table>
</body>
</html>
