<!-- Supabase Script -->
<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

  // ✅ Use your actual Supabase project URL and anon key
  const supabaseUrl = "https://skptdtrduxzcijitemty.supabase.co"
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkaXdmZmVjZHRjam9keGxtdmp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU5NjI0NjcsImV4cCI6MjA4MTUzODQ2N30.zRBiACPJfc0fkvBs6eYEbVkMjk8Yko3vzlvCGWTFTs"
  const supabase = createClient(supabaseUrl, supabaseKey)

  // Waitlist
  async function joinWaitlist() {
    const email = document.querySelector("#waitlistEmail").value
    const { error } = await supabase.from("waitlist").insert([{ email }])
    if (error) {
      alert("Error: " + error.message)
    } else {
      alert("You’ve joined the waitlist!")
    }
  }

  // Signup
  async function signup() {
    const email = document.querySelector("#signupEmail").value
    const password = document.querySelector("#signupPassword").value
    const { error } = await supabase.auth.signUp({ email, password })
    if (error) {
      alert("Signup error: " + error.message)
    } else {
      alert("Signup successful! Please check your email to confirm.")
    }
  }

  // Login with role-based redirect
  async function login() {
    const email = document.querySelector("#loginEmail").value
    const password = document.querySelector("#loginPassword").value
    const role = document.querySelector("#roleSelect").value

    const { error } = await supabase.auth.signInWithPassword({ email, password })

    if (error) {
      alert("Login error: " + error.message)
    } else {
      alert("Login successful! Redirecting to your dashboard...")

      if (role === "contractor") {
        window.location.href = "contractor.html"
      } else if (role === "supplier") {
        window.location.href = "supplier.html"
      } else if (role === "logistics") {
        window.location.href = "logistics.html"
      } else if (role === "admin") {
        window.location.href = "admin.html"
      } else {
        window.location.href = "index.html"
      }
    }
  }
</script>
